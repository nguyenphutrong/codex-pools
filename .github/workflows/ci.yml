name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build macOS app
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Build Swift package
        run: swift build

      - name: Run tests if present
        run: |
          if [ -d Tests ]; then
            swift test
          else
            echo "No Tests directory; skipping swift test."
          fi

      - name: Build app bundle
        run: ./script/build_and_run.sh --build-only

      - name: Validate app bundle
        run: |
          test -x "dist/Codex Pools.app/Contents/MacOS/CodexPools"
          test -x "dist/codex-pools"
          test -f "dist/Codex Pools.app/Contents/Resources/CodexPools.icns"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "dist/Codex Pools.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIconFile' "dist/Codex Pools.app/Contents/Info.plist"
          codesign --verify --deep --strict --verbose=1 "dist/Codex Pools.app"
