name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release artifact
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          case "$version" in
            v*) ;;
            *) echo "Version must start with v, got: $version" >&2; exit 1 ;;
          esac

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        run: ./script/build_and_run.sh --build-only

      - name: Validate app bundle
        run: codesign --verify --deep --strict --verbose=1 "dist/Codex Pools.app"

      - name: Package app
        run: |
          version="${{ steps.version.outputs.value }}"
          zip_artifact="CodexPools-${version}.zip"
          dmg_artifact="CodexPools-${version}.dmg"

          ditto -c -k --keepParent "dist/Codex Pools.app" "$zip_artifact"

          rm -rf dmg-root
          mkdir -p dmg-root
          cp -R "dist/Codex Pools.app" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "Codex Pools" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "$dmg_artifact"

          shasum -a 256 "$dmg_artifact" "$zip_artifact" > SHA256SUMS.txt

      - name: Write release notes
        run: |
          cat > release-notes.md <<'MARKDOWN'
          ## Installation

          Download the DMG or ZIP below.

          > ⚠️ **Note**: The app is not signed with an Apple Developer certificate. If macOS blocks the app, run:
          > ```bash
          > xattr -cr "/Applications/Codex Pools.app"
          > ```

          This release is ad-hoc signed and is not notarized.
          MARKDOWN

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.value }}"
          zip_artifact="CodexPools-${version}.zip"
          dmg_artifact="CodexPools-${version}.dmg"

          gh release create "$version" \
            "$dmg_artifact" \
            "$zip_artifact" \
            SHA256SUMS.txt \
            --title "Codex Pools $version" \
            --notes-file release-notes.md
