name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build release artifact
    runs-on: macos-26
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          case "$version" in
            v*) ;;
            *) echo "Version must start with v, got: $version" >&2; exit 1 ;;
          esac

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "short=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.short }}
          APP_BUILD: ${{ github.run_number }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          if [ -z "$SPARKLE_PUBLIC_ED_KEY" ]; then
            echo "Missing SPARKLE_PUBLIC_ED_KEY repository secret." >&2
            exit 1
          fi

          ./script/build_and_run.sh --build-only

      - name: Validate app bundle
        run: codesign --verify --deep --strict --verbose=1 "dist/Codex Pools.app"

      - name: Package app
        run: |
          version="${{ steps.version.outputs.value }}"
          zip_artifact="CodexPools-${version}.zip"
          dmg_artifact="CodexPools-${version}.dmg"
          cli_artifact="codex-pools-${version}-macos"

          ditto -c -k --keepParent "dist/Codex Pools.app" "$zip_artifact"
          cp "dist/codex-pools" "$cli_artifact"

          rm -rf dmg-root
          mkdir -p dmg-root
          cp -R "dist/Codex Pools.app" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "Codex Pools" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "$dmg_artifact"

          shasum -a 256 "$dmg_artifact" "$zip_artifact" "$cli_artifact" > SHA256SUMS.txt

      - name: Generate Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_ED_PRIVATE_KEY" ]; then
            echo "Missing SPARKLE_ED_PRIVATE_KEY repository secret." >&2
            exit 1
          fi

          generate_appcast="$(find .build/artifacts -path "*/bin/generate_appcast" -type f -print -quit)"
          if [ -z "$generate_appcast" ]; then
            echo "Could not find Sparkle generate_appcast tool under .build/artifacts." >&2
            exit 1
          fi

          version="${{ steps.version.outputs.value }}"
          dmg_artifact="CodexPools-${version}.dmg"

          rm -rf pages
          mkdir -p pages
          cp "$dmg_artifact" pages/
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://nguyenphutrong.github.io/codex-pools/" \
            pages

      - name: Write release notes
        run: |
          cat > release-notes.md <<'MARKDOWN'
          ## Installation

          Download the DMG or ZIP below.
          The `codex-pools-*-macos` binary is the optional CLI.

          > ⚠️ **Note**: The app is not signed with an Apple Developer certificate. If macOS blocks the app, run:
          > ```bash
          > xattr -cr "/Applications/Codex Pools.app"
          > ```

          This release is ad-hoc signed and is not notarized.
          MARKDOWN

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.value }}"
          zip_artifact="CodexPools-${version}.zip"
          dmg_artifact="CodexPools-${version}.dmg"
          cli_artifact="codex-pools-${version}-macos"

          gh release create "$version" \
            "$dmg_artifact" \
            "$zip_artifact" \
            "$cli_artifact" \
            SHA256SUMS.txt \
            --title "Codex Pools $version" \
            --notes-file release-notes.md

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
